<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Captain Fix — Generate Test Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-light bg-white border-bottom mb-4">
      <div class="container">
        <span class="navbar-brand fw-bold">Captain Fix</span>
        <div class="d-flex align-items-center gap-3">
          <span class="text-muted small">{{ current_user.email }}</span>
          <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary btn-sm">Sign Out</a>
        </div>
      </div>
    </nav>
    <div class="container py-3" style="max-width: 640px;">
      <h1 class="mb-4 text-center">Captain Fix</h1>
      <p class="text-center text-muted mb-4">AI-powered Selenium test plan generator</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endwith %}

      <form action="{{ url_for('submit') }}" method="post" class="card p-4 shadow-sm bg-white">
        <div class="mb-3">
          <label for="target" class="form-label fw-semibold">Target URL</label>
          <input type="url" class="form-control" id="target" name="target"
                 placeholder="https://example.com" required>
        </div>

        <div class="row mb-3">
          <div class="col">
            <label for="depth" class="form-label fw-semibold">Crawl Depth</label>
            <input type="number" class="form-control" id="depth" name="depth"
                   value="1" min="1" max="5">
          </div>
          <div class="col">
            <label for="num_cases" class="form-label fw-semibold">Number of Test Cases</label>
            <input type="number" class="form-control" id="num_cases" name="num_cases"
                   value="5" min="1" max="30">
          </div>
        </div>

        <div class="mb-3">
          <label for="pm_tool" class="form-label fw-semibold">PM Tool <span class="text-muted fw-normal">(optional)</span></label>
          <select class="form-select" id="pm_tool" name="pm_tool">
            <option value="">None</option>
            <option value="jira">Jira</option>
            <option value="trello">Trello</option>
            <option value="linear">Linear</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="email" class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="you@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fs-5">
          🚀 Generate Test Plan
        </button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
