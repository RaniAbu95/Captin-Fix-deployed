<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Captain Fix — Input Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <h1 class="mb-4 text-center">🚀 Captain Fix — Input Form</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ 'success' if category=='success' else 'danger' }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Logout Button -->
  <div class="text-end mb-3">
    <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary">Logout</a>
  </div>

  <!-- Scan Form -->
  <form action="{{ url_for('submit') }}" method="post" class="card p-4 shadow-sm bg-white">
    <div class="mb-3">
      <label for="target" class="form-label">🌐 Target Website URL</label>
      <input type="url" class="form-control" id="target" name="target" placeholder="https://example.com" required>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="depth" class="form-label">📏 Crawl Depth</label>
        <input type="number" class="form-control" id="depth" name="depth" min="1" max="10" value="2">
      </div>
      <div class="col-md-4 mb-3">
        <label for="num_cases" class="form-label">🔢 Number of Test Cases</label>
        <input type="number" class="form-control" id="num_cases" name="num_cases" min="1" max="200" value="10">
      </div>
      <div class="col-md-4 mb-3">
        <label for="pm_tool" class="form-label">🛠 Project Management Tool</label>
        <select class="form-select" id="pm_tool" name="pm_tool">
          <option value="jira">Jira</option>
          <option value="trello">Trello</option>
          <option value="none" selected>None</option>
        </select>
      </div>
    </div>

    <!-- 🧠 Special Instructions -->
    <div class="mb-3">
      <label for="instructions" class="form-label">🧠 Special Instructions</label>
      <textarea id="instructions" name="instructions" class="form-control"></textarea>

    </div>

    <div class="d-flex justify-content-end">
      <button type="submit" class="btn btn-primary">Start Scan</button>
    </div>
  </form>

  <div class="mt-4 text-center">
    <a href="{{ url_for('history') }}">📜 View Scan History</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
<!-- Spinner Overlay -->
<div id="loadingOverlay" style="
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    text-align: center;
">
    <div style="position: relative; top: 50%; transform: translateY(-50%); color: white;">
        <div class="spinner" style="
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: auto;
        "></div>
        <p>⚡ Processing, please wait...</p>
    </div>
</div>

<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</html>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const form = document.querySelector("form"); // افترض ان الفورم هو form الأول
    const overlay = document.getElementById("loadingOverlay");

    form.addEventListener("submit",  function() {
        overlay.style.display = "block"; // إظهار المؤشر عند الضغط
    });
});
</script>
